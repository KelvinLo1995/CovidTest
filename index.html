<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COVID-19 Virtual Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6; /* Gray-100 */
            /* Ensure the body takes full viewport height and allows scrolling if needed */
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-x: hidden;
        }

        /* Prevent text selection during drag */
        .no-select { user-select: none; -webkit-user-select: none; }

        /* Smooth wicking animation for the test fluid */
        #wicking-fluid {
            transition: width 3s linear;
        }

        /* Soft fade for lines */
        .fade-in { opacity: 1 !important; transition: opacity 1s ease-in; }
        
        /* Swab Hitbox Ring */
        .hitbox-ring {
            transition: all 0.3s ease;
            box-shadow: 0 0 0 0px rgba(74, 222, 128, 0.4);
        }
        .hitbox-ring.active {
            box-shadow: 0 0 0 10px rgba(74, 222, 128, 0.6);
            border-color: #22c55e;
            background-color: rgba(74, 222, 128, 0.2);
        }
    </style>
</head>
<body>

    <!-- Main App Card (Strictly Mobile Sized) -->
    <div class="bg-white rounded-3xl shadow-xl w-full max-w-[360px] flex flex-col p-5 space-y-4 relative z-10">
        
        <!-- Header -->
        <div class="text-center flex flex-col items-center">
            <span class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider mb-2">Virtual Lab Deck</span>
            <h1 class="text-xl font-extrabold text-slate-800 leading-tight">Rapid Antigen Test</h1>
            <p id="assistant-text" class="text-xs text-slate-500 mt-1 h-4">Tap start to begin the procedure.</p>
        </div>

        <!-- Interactive Playground (Strict Fixed Height) -->
        <!-- touch-action: none ONLY on this box to prevent page scrolling while dragging -->
        <div id="playground" class="relative bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl h-[240px] w-full overflow-hidden flex-shrink-0 touch-none no-select">
            
            <!-- Stage 0: Start -->
            <div id="stage-0" class="absolute inset-0 flex flex-col items-center justify-center p-4">
                <button onclick="startTest()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full shadow-lg active:scale-95 transition-transform w-full max-w-[200px]">
                    Start Virtual Test
                </button>
            </div>

            <!-- Stage 1: Swab Nose -->
            <div id="stage-1" class="absolute inset-0 hidden">
                <div class="flex flex-col items-center justify-center h-full relative">
                    <!-- Nostrils target -->
                    <div id="target-nose" class="relative w-24 h-16 bg-pink-100 rounded-t-[50px] rounded-b-2xl flex justify-center items-end pb-2 hitbox-ring border-2 border-transparent">
                        <div class="w-8 h-8 bg-pink-900 rounded-full mx-1"></div>
                        <div class="w-8 h-8 bg-pink-900 rounded-full mx-1"></div>
                    </div>
                    
                    <!-- Draggable Swab Container (Large invisible touch wrapper) -->
                    <div id="drag-swab" class="absolute w-16 h-28 flex flex-col items-center justify-start z-20 cursor-grab transform -translate-x-1/2 -translate-y-1/2 transition-transform duration-75">
                        <!-- Swab Head -->
                        <div class="w-5 h-7 bg-white rounded-full shadow-sm z-10"></div>
                        <!-- Wooden Stick -->
                        <div class="w-2 h-20 bg-yellow-200 rounded-b-full shadow-sm -mt-2"></div>
                    </div>
                </div>
            </div>

            <!-- Stage 2: Mix Solution -->
            <div id="stage-2" class="absolute inset-0 hidden">
                <div class="flex flex-col items-center justify-end h-full pb-6 relative">
                    <!-- Buffer Tube target -->
                    <div id="target-tube" class="relative w-14 h-24 border-x-4 border-b-4 border-white bg-slate-200/50 rounded-b-3xl flex items-end overflow-hidden hitbox-ring shadow-inner">
                        <div id="buffer-liquid" class="w-full h-1/2 bg-blue-200/60 transition-all duration-300"></div>
                    </div>

                    <!-- Draggable Mixing Swab -->
                    <div id="drag-mix" class="absolute w-16 h-28 flex flex-col items-center justify-start z-20 cursor-grab transform -translate-x-1/2 -translate-y-1/2 transition-transform duration-75">
                        <div class="w-5 h-7 bg-white rounded-full shadow-sm z-10"></div>
                        <div class="w-2 h-20 bg-yellow-200 rounded-b-full shadow-sm -mt-2"></div>
                    </div>
                </div>
            </div>

            <!-- Stage 3: Dripping -->
            <div id="stage-3" class="absolute inset-0 hidden">
                <div class="flex flex-col items-center justify-center h-full relative pt-10">
                    <!-- Target Well indicator (points down to physical cassette) -->
                    <div class="w-16 h-16 rounded-full border-4 border-dashed border-blue-300 animate-pulse mb-8 flex items-center justify-center">
                        <span class="text-blue-400 text-xs font-bold text-center leading-tight">Drop<br>Here</span>
                    </div>

                    <!-- Draggable Dropper -->
                    <div id="drag-dropper" class="absolute w-16 h-24 flex flex-col items-center justify-start z-20 cursor-grab transform -translate-x-1/2 -translate-y-1/2">
                        <!-- Dropper Bulb -->
                        <div class="w-8 h-10 bg-slate-100 border border-slate-300 rounded-t-full shadow-sm"></div>
                        <!-- Dropper Tip -->
                        <div class="w-3 h-10 bg-white/80 border-x border-b border-slate-200 rounded-b-md shadow-sm relative">
                            <!-- Liquid Drop (hidden initially) -->
                            <div id="liquid-drop" class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-2.5 h-3 bg-blue-400 rounded-full opacity-0 transition-all duration-300 ease-in"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stage 4: Processing (Wait) -->
            <div id="stage-4" class="absolute inset-0 hidden flex flex-col items-center justify-center bg-slate-50/90 z-30">
                <div class="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-3"></div>
                <p class="text-sm font-bold text-slate-700">Processing Sample</p>
                <p class="text-xs text-slate-500">Please wait...</p>
            </div>

            <!-- Stage 5: Results Screen (Compact) -->
            <div id="stage-5" class="absolute inset-0 hidden flex flex-col items-center justify-center text-center p-4 bg-white/95 z-40">
                <div id="result-badge" class="px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 mb-3">
                    <div id="result-dot" class="w-2.5 h-2.5 rounded-full"></div> 
                    <span id="result-title">RESULT</span>
                </div>
                <p id="result-desc" class="text-[11px] text-slate-500 leading-snug mb-5 px-2">Description goes here.</p>
                <button onclick="resetTest()" class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl px-6 py-2.5 font-semibold text-sm shadow-md active:scale-95 transition-transform w-full max-w-[180px]">
                    Run Another Test
                </button>
            </div>
            
        </div>

        <!-- The Physical Cassette (Strict Fixed Height) -->
        <div class="bg-slate-100/60 rounded-2xl p-3 border border-slate-200 flex flex-col justify-between h-[90px] w-full flex-shrink-0">
            <div class="text-[9px] text-slate-400 font-bold tracking-wider mb-1">SARS-CoV-2 Ag</div>
            <div class="flex items-center justify-between px-2">
                <!-- Sample Well -->
                <div class="relative w-10 h-10 rounded-full border-2 border-slate-300 bg-white flex items-center justify-center shadow-inner overflow-hidden">
                    <div id="well-liquid" class="absolute inset-0 bg-slate-300 opacity-0 transition-opacity duration-500"></div>
                    <span id="well-text" class="text-[10px] text-slate-300 font-bold z-10 transition-colors duration-500">S</span>
                </div>
                
                <!-- Arrow -->
                <div class="text-slate-300 text-xs">▶</div>
                
                <!-- Result Window -->
                <div class="w-32 h-10 bg-white border border-slate-300 rounded shadow-inner flex justify-around items-center px-3 relative overflow-hidden">
                    <!-- Control Line -->
                    <div class="flex flex-col items-center z-10 w-4">
                        <span class="text-[8px] font-bold text-slate-400 mb-0.5">C</span>
                        <div class="w-1.5 h-5 bg-slate-100 rounded-sm overflow-hidden">
                            <div id="c-line" class="w-full h-full bg-red-600 opacity-0"></div>
                        </div>
                    </div>
                    <!-- Test Line -->
                    <div class="flex flex-col items-center z-10 w-4">
                        <span class="text-[8px] font-bold text-slate-400 mb-0.5">T</span>
                        <div class="w-1.5 h-5 bg-slate-100 rounded-sm overflow-hidden">
                            <div id="t-line" class="w-full h-full bg-red-600 opacity-0"></div>
                        </div>
                    </div>
                    <!-- Wicking Fluid Animation -->
                    <div id="wicking-fluid" class="absolute left-0 top-0 bottom-0 w-0 bg-red-50/40 z-0"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Confetti Canvas (Full Screen ON TOP of Card) -->
    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50 w-full h-full transition-opacity duration-1000 opacity-0"></canvas>

    <script>
        // --- State Management ---
        let currentStage = 0;
        let progress = 0;
        const requiredProgress = 100; // Time needed to hold inside hitbox
        
        let isDragging = false;
        let activeItem = null;
        let activeHitbox = null;
        let animationFrameId = null;

        // --- DOM Elements ---
        const assistantText = document.getElementById('assistant-text');
        const playground = document.getElementById('playground');
        const cLine = document.getElementById('c-line');
        const tLine = document.getElementById('t-line');
        const wickingFluid = document.getElementById('wicking-fluid');
        const wellLiquid = document.getElementById('well-liquid');
        const wellText = document.getElementById('well-text');

        // --- UI Setup & Reset ---
        function setStage(stageNum) {
            for(let i=0; i<=5; i++) {
                const el = document.getElementById(`stage-${i}`);
                if(el) el.classList.add('hidden');
            }
            const activeEl = document.getElementById(`stage-${stageNum}`);
            if(activeEl) activeEl.classList.remove('hidden');
            currentStage = stageNum;
        }

        function resetTest() {
            dismissConfetti();
            setStage(0);
            assistantText.innerText = "Tap start to begin the procedure.";
            
            // Reset Visuals
            cLine.classList.remove('fade-in');
            tLine.classList.remove('fade-in');
            wickingFluid.style.width = '0%';
            wickingFluid.style.transition = 'none'; // reset without animation
            wellLiquid.style.opacity = '0';
            if (wellText) wellText.className = 'text-[10px] text-slate-300 font-bold z-10 transition-colors duration-500';
            
            // Reset items to center
            const pRect = playground.getBoundingClientRect();
            const centerX = pRect.width / 2;
            const centerY = pRect.height / 2;
            
            ['drag-swab', 'drag-mix', 'drag-dropper'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.style.left = `${centerX}px`;
                    el.style.top = `${centerY}px`;
                    el.style.transform = `translate(-50%, -50%) scale(1)`;
                }
            });
        }

        function startTest() {
            setStage(1);
            assistantText.innerText = "Drag swab over nostrils to collect sample.";
            setupDrag('drag-swab', 'target-nose', advanceToMix);
        }

        function advanceToMix() {
            setStage(2);
            assistantText.innerText = "Stir swab inside the buffer solution tube.";
            setupDrag('drag-mix', 'target-tube', advanceToDrop);
        }

        function advanceToDrop() {
            setStage(3);
            assistantText.innerText = "Squeeze 3 drops into the cassette well.";
            // For dropping, we use click instead of drag-progress for better feel
            setupDropper();
        }

        // --- Interaction Logic: Dragging ---
        function setupDrag(dragId, targetId, onComplete) {
            const dragEl = document.getElementById(dragId);
            const targetEl = document.getElementById(targetId);
            progress = 0;
            activeItem = dragEl;
            activeHitbox = targetEl;

            // Set initial position exactly in the middle of playground
            const rect = playground.getBoundingClientRect();
            dragEl.style.left = `${rect.width / 2}px`;
            dragEl.style.top = `${rect.height / 2 + 40}px`;

            // Clear old listeners
            const clone = dragEl.cloneNode(true);
            dragEl.parentNode.replaceChild(clone, dragEl);
            activeItem = clone;

            // Add standard universal drag events
            activeItem.addEventListener('mousedown', handleStart, {passive: false});
            activeItem.addEventListener('touchstart', handleStart, {passive: false});

            function checkCompletion() {
                if(progress >= requiredProgress) {
                    endGlobalDrag();
                    targetEl.classList.remove('active');
                    onComplete();
                }
            }

            // Bind collision checker loop
            activeItem.onCollisionTick = () => {
                if(checkIntersection(activeItem, targetEl)) {
                    targetEl.classList.add('active');
                    progress += 2; // Speed of completion
                    
                    // Add slight visual feedback while active
                    if(targetId === 'target-tube') {
                         document.getElementById('buffer-liquid').style.transform = `rotate(${Math.sin(progress/5)*5}deg) scaleY(${1 + Math.sin(progress/10)*0.1})`;
                    }
                } else {
                    targetEl.classList.remove('active');
                }
                checkCompletion();
            };
        }

        // --- Interaction Logic: Dropper ---
        function setupDropper() {
            const dropper = document.getElementById('drag-dropper');
            let drops = 0;
            
            const rect = playground.getBoundingClientRect();
            dropper.style.left = `${rect.width / 2}px`;
            dropper.style.top = `${rect.height / 2 - 20}px`;

            const clone = dropper.cloneNode(true);
            dropper.parentNode.replaceChild(clone, dropper);
            const newDropper = clone;

            newDropper.addEventListener('mousedown', dropFluid);
            newDropper.addEventListener('touchstart', (e) => { e.preventDefault(); dropFluid(); }, {passive: false});

            function dropFluid() {
                if(drops >= 3) return;
                
                // Visual click squeeze
                newDropper.style.transform = `translate(-50%, -50%) scale(0.9)`;
                setTimeout(() => newDropper.style.transform = `translate(-50%, -50%) scale(1)`, 150);

                // Show drop
                const dropEl = newDropper.querySelector('#liquid-drop');
                dropEl.style.opacity = '1';
                dropEl.style.transform = `translate(-50%, 40px)`; // animate down
                
                setTimeout(() => {
                    dropEl.style.opacity = '0';
                    dropEl.style.transform = `translate(-50%, 0)`; // reset
                    
                    // Simulate wet paper by darkening the background and the 'S' text
                    wellLiquid.style.opacity = (drops * 0.3) + 0.2; 
                    if (drops === 0) wellText.className = 'text-[10px] text-slate-400 font-bold z-10 transition-colors duration-500';
                    if (drops === 1) wellText.className = 'text-[10px] text-slate-500 font-bold z-10 transition-colors duration-500';
                    if (drops === 2) wellText.className = 'text-[10px] text-slate-600 font-bold z-10 transition-colors duration-500';
                }, 300);

                drops++;
                assistantText.innerText = `Drops added: ${drops}/3`;

                if(drops >= 3) {
                    setTimeout(processResults, 600);
                }
            }
        }

        // --- Global Drag Handlers (Rock Solid iOS Math) ---
        function handleStart(e) {
            e.preventDefault();
            isDragging = true;
            activeItem.style.transform = `translate(-50%, -50%) scale(1.05)`; // Tactile feedback
            
            // Start the physics loop
            if(activeItem.onCollisionTick) {
                const loop = () => {
                    if(isDragging) activeItem.onCollisionTick();
                    animationFrameId = requestAnimationFrame(loop);
                };
                loop();
            }
        }

        function handleMove(e) {
            if (!isDragging || !activeItem) return;
            e.preventDefault(); // Prevents iOS scrolling during drag

            // Use getBoundingClientRect for absolute pixel-perfect math
            const pRect = playground.getBoundingClientRect();
            
            let clientX, clientY;
            if (e.type.includes('touch')) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            // Calculate x,y relative to the playground container
            let x = clientX - pRect.left;
            let y = clientY - pRect.top;

            // Boundary constraints (keep item fully inside playground)
            x = Math.max(20, Math.min(x, pRect.width - 20));
            y = Math.max(20, Math.min(y, pRect.height - 20));

            activeItem.style.left = `${x}px`;
            activeItem.style.top = `${y}px`;
        }

        function endGlobalDrag() {
            isDragging = false;
            if(activeItem) {
                activeItem.style.transform = `translate(-50%, -50%) scale(1)`;
            }
            cancelAnimationFrame(animationFrameId);
        }

        // Bind global listeners to document for smooth tracking outside element
        document.addEventListener('mousemove', handleMove, {passive: false});
        document.addEventListener('touchmove', handleMove, {passive: false});
        document.addEventListener('mouseup', endGlobalDrag);
        document.addEventListener('touchend', endGlobalDrag);

        // Simple AABB Collision Detection
        function checkIntersection(el1, el2) {
            if(!el1 || !el2) return false;
            const r1 = el1.getBoundingClientRect();
            const r2 = el2.getBoundingClientRect();
            
            // Shrink target box slightly to require 'deep' insertion
            return !(r1.right < r2.left + 10 || 
                     r1.left > r2.right - 10 || 
                     r1.bottom < r2.top + 10 || 
                     r1.top > r2.bottom - 10);
        }

        // --- Processing & Results ---
        function processResults() {
            setStage(4);
            assistantText.innerText = "Awaiting capillary action...";
            
            // Restore transition for wicking
            wickingFluid.style.transition = 'width 3s linear';
            // Start wicking animation
            setTimeout(() => {
                wickingFluid.style.width = '100%';
            }, 100);

            // Wait for processing
            setTimeout(() => {
                showFinalResult();
            }, 3500);
        }

        function showFinalResult() {
            setStage(5);
            cLine.classList.add('fade-in'); // Control always shows

            const isPositive = Math.random() > 0.6; // 40% chance positive

            const rBadge = document.getElementById('result-badge');
            const rDot = document.getElementById('result-dot');
            const rTitle = document.getElementById('result-title');
            const rDesc = document.getElementById('result-desc');

            if (isPositive) {
                tLine.classList.add('fade-in');
                assistantText.innerText = "Antigens Detected.";
                
                rBadge.className = 'px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 mb-3 bg-red-100 text-red-700';
                rDot.className = 'w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse';
                rTitle.innerText = 'POSITIVE (+)';
                rDesc.innerText = 'SARS-CoV-2 antigens detected. Please isolate immediately, wear a mask, and consult a healthcare provider.';
                
                startConfetti();
            } else {
                assistantText.innerText = "No Antigens Detected.";
                
                rBadge.className = 'px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 mb-3 bg-green-100 text-green-700';
                rDot.className = 'w-2.5 h-2.5 rounded-full bg-green-600';
                rTitle.innerText = 'NEGATIVE (-)';
                rDesc.innerText = 'No SARS-CoV-2 antigens were detected. If symptoms persist, please perform another test in 24-48 hours.';
            }
        }

        // --- Celebration Confetti ---
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let confettiFrameId = null;
        let isSpawning = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createParticles() {
            if(!isSpawning) return;
            
            // Original Colorful Confetti Palette
            const colors = [
                '#26ccff', // Blue
                '#a25afd', // Purple
                '#ff5e7e', // Pink
                '#88ff5a', // Green
                '#fcff42', // Yellow
                '#ffa62d', // Orange
                '#ff36ff'  // Magenta
            ]; 
            
            if (particles.length < 150) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: -10,
                    size: Math.random() * 8 + 4, // Slightly larger particles
                    speedY: Math.random() * 3 + 2,
                    speedX: (Math.random() - 0.5) * 3, // Wider spread
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10 // Faster spin
                });
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            createParticles();

            particles.forEach((p, index) => {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += p.rotationSpeed;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();

                // Remove particles that fall off screen
                if (p.y > canvas.height) {
                    particles.splice(index, 1);
                }
            });

            if (particles.length > 0 || isSpawning) {
                confettiFrameId = requestAnimationFrame(animateConfetti);
            }
        }

        function startConfetti() {
            canvas.classList.remove('opacity-0');
            canvas.classList.add('opacity-100');
            isSpawning = true;
            particles = [];
            if(!confettiFrameId) animateConfetti();
        }

        function dismissConfetti() {
            // Stop generating new particles
            isSpawning = false;
            // Fade out canvas smoothly
            canvas.classList.remove('opacity-100');
            canvas.classList.add('opacity-0');
            
            // Wait for fade to finish before completely stopping loop to allow drift
            setTimeout(() => {
                particles = [];
                cancelAnimationFrame(confettiFrameId);
                confettiFrameId = null;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 1000); 
        }

        // Initialize state on load
        resetTest();
    </script>
</body>
</html>
